name: knowledge_review
kind: workflow
enabled: true
description: Reconcile the wiki against knowledge_reviews and generate cached recall points for due docs along a fixed Ebbinghaus curve.
factory: paca.workflows.knowledge_review:factory
expose:
  # Not an agno/AgentOS workflow — no LLM exposure to the dashboard UI; the CLI
  # invokes via extra.run_now below. factory above raises if AgentOS ever tries
  # to bind it.
  agent_os: false
  tool:
    enabled: false
extra:
  run_now: paca.workflows.knowledge_review:run
