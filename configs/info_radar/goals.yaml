  - name: startup_opportunity_scouting
    description: |
      寻找符合三个硬条件的创业机会：(1) **复利**——产品 / 业务 / 数据三类飞轮
      之一明显成立，每多一个用户、一个交易、一个数据点都让护城河更深；
      (2) **与未来风口一致**——AI / 机器人 / 太空 / 自动化 是大方向，避开
      sunset 行业；(3) **早期阶段、潜力巨大**——TAM ≥ 100 亿美金、当前 PMF
      尚未成熟但拐点临近、估值还在 seed / Series A / B 阶段。重点观察：
      product wedge 是什么、moat 怎么建、为什么是现在（why now）、创始人
      为什么是对的人。**不**关心：成熟期 SaaS、纯执行型创业、me-too 项目。
    topics:
      - "AI-native 产品形态：agent first、多模态交互、个人化 AI"
      - "开发者工具：coding agent、agent infra、dev productivity、API 平台"
      - "垂直行业 AI：医疗、法律、金融、教育、制造、保险、税务"
      - "机器人新形态：家庭服务、配送、清洁、农业、建筑"
      - "内容生产范式变革：生成式媒体、创作者经济、AI native social"
      - "商业模式创新：usage-based pricing、数据飞轮、网络效应、平台化"
      - "早期市场信号：YC / a16z / Sequoia / Benchmark / 创始人故事"
      - "AI native infra：browser use、computer use、operator agent"
      - "中国独特机会：海外华人创业、跨境产品、出海"
