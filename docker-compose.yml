# Containerized cloud-LLM deployment for next-signal.
# See docs/containerized-deployment.md for the full design.
#
#   docker compose up --build            # postgres + bootstrap + dashboard
#
# Cloud-LLM by default: OMLX is left unset so model profiles fall back to the
# cloud (DeepSeek/Claude, per configs/models.yaml). To use the LOCAL LLM
# embedder, run an OMLX server on the HOST and set, in .env:
#   OMLX_BASE_URL=http://host.docker.internal:<port>/v1
# (host.docker.internal is wired below for Linux via host-gateway too.)

name: next-signal

# ---- Postgres connection, overridable from the environment/.env ----
x-postgres-env: &postgres-env
  POSTGRES_USER: ${POSTGRES_USER:-paca}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-paca}
  POSTGRES_DB: ${POSTGRES_DB:-next_signal}

# ---- Shared app-container config (image, env, mounts, host bridge) ----
x-app: &app
  build:
    context: .
    dockerfile: Dockerfile
    args:
      GBRAIN_REF: ${GBRAIN_REF:-a25209bbb2bacf1b88e06fd5282b27f1bf4a3e7a}
      OPENCLI_REF: ${OPENCLI_REF:-v1.8.1}
  image: next-signal:latest
  # Cloud API keys come from .env (secrets stay OUT of the image).
  env_file:
    - .env
  environment:
    # These override whatever .env holds so the container is self-consistent:
    # point at the postgres SERVICE, and use in-container paths.
    DATABASE_URL: postgresql://${POSTGRES_USER:-paca}:${POSTGRES_PASSWORD:-paca}@postgres:5432/${POSTGRES_DB:-next_signal}
    PACA_STATE_DIR: /state
    PACA_WIKI_DIR: /wiki
    PACA_WIKI_RAW_DIR: /wiki-raw
    PACA_GBRAIN_HOME: /state/gbrain          # gbrain config/cache dir (config.json persists here)
    # gbrain uses its POSTGRES engine against a dedicated DB in the same server.
    # The bun-compiled binary can't run PGLite (extension bundles aren't embedded),
    # and pgvector already ships `vector` + `pg_trgm`, so Postgres is the fit.
    PACA_GBRAIN_DATABASE_URL: postgresql://${POSTGRES_USER:-paca}:${POSTGRES_PASSWORD:-paca}@postgres:5432/gbrain
    OPENCLI_BIN: /opt/opencli/dist/src/main.js
    HOME: /root                              # writable HOME for npx (folocli) cache
  volumes:
    - pstate:/state
    # Host knowledge dirs — sources come from .env (${PACA_WIKI_DIR} etc.),
    # mounted read-write because ingest/re-index writes into them.
    - ${PACA_WIKI_DIR:?set PACA_WIKI_DIR in .env}:/wiki
    - ${PACA_WIKI_RAW_DIR:?set PACA_WIKI_RAW_DIR in .env}:/wiki-raw
  # Lets the container reach a HOST-side OMLX server via
  # host.docker.internal on Linux (Docker Desktop provides it already).
  extra_hosts:
    - "host.docker.internal:host-gateway"
  restart: unless-stopped

services:
  # --- Postgres 16 + pgvector: paca's main DB (agno + business tables) ---
  postgres:
    image: pgvector/pgvector:pg16
    environment: *postgres-env
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Uncomment to inspect the DB from the host:
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-paca} -d ${POSTGRES_DB:-next_signal}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # --- One-shot schema bootstrap: paca main DB + gbrain DB/init (idempotent) ---
  bootstrap:
    <<: *app
    command: ["sh", "scripts/container_bootstrap.sh"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  # --- Dashboard (Next.js, production build) on :3000 ---
  # Spawns `paca` CLI children + gbrain/folocli as subprocesses, so it runs
  # from the same image. `next start` binds 0.0.0.0, reachable once published.
  dashboard:
    <<: *app
    command: ["paca", "dashboard", "--start", "--port", "3000"]
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      bootstrap:
        condition: service_completed_successfully

volumes:
  pgdata:      # Postgres data
  pstate:      # PACA_STATE_DIR (host default ~/.next-signal) + gbrain PGLite
